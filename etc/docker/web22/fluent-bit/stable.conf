[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File /dw/etc/fluent-bit/parsers.conf

[INPUT]
    Name             tail
    Alias            error_tail
    Path             /var/log/starman/error.log
    Tag              error
    Read_from_Head   true
    Refresh_Interval 5

[INPUT]
    Name             tail
    Alias            access_tail
    Path             /var/log/starman/access.log
    Tag              access
    Parser           dw_access_json
    Read_from_Head   true
    Refresh_Interval 5

[OUTPUT]
    Name        loki
    Match       error
    Host        logs-prod-042.grafana.net
    Port        443
    tls         On
    tls.verify  On
    Http_User   ${LOKI_USER}
    Http_Passwd ${LOKI_PASSWORD}
    Labels      source=dreamwidth, service=${DW_LOKI_SERVICE}, stream=error
    line_format key_value

[OUTPUT]
    Name        loki
    Match       access
    Host        logs-prod-042.grafana.net
    Port        443
    tls         On
    tls.verify  On
    Http_User   ${LOKI_USER}
    Http_Passwd ${LOKI_PASSWORD}
    Labels      source=dreamwidth, service=${DW_LOKI_SERVICE}, stream=access
    line_format json
